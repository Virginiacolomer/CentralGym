<app-page-bg>
<div class="hours-page">
  <section class="hours-shell">
    <app-page-header [showBack]="true" backHref="/"></app-page-header>

    <div class="hours-grid">
      <article class="hours-copy">
        <h1>Horarios</h1>
        <p>Organiza tus entrenamientos con nuestras franjas horarias disponibles.</p>

        <section class="hours-card" aria-label="Horarios del gimnasio">
          <div class="hours-block">
            <h2>Lunes a viernes</h2>

            <div class="slot">
              <span>Manana</span>
              <strong>6:30 - 10:00</strong>
            </div>

            <div class="slot">
              <span>Siesta</span>
              <strong>13:30 - 16:00</strong>
            </div>

            <div class="slot">
              <span>Tarde / noche</span>
              <strong>18:00 - 22:00</strong>
            </div>
          </div>

          <div class="hours-divider" aria-hidden="true"></div>

          <div class="hours-block hours-block--compact">
            <h2>Sabado</h2>
            <strong>9:00 - 11:00</strong>
          </div>
        </section>
      </article>


    </div>
  </section>
</div>
</app-page-bg>
