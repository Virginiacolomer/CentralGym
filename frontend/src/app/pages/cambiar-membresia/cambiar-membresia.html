<app-page-bg>
  <main class="page-with-compact-header">
    <app-page-header-compact backHref="/mi-membresia"></app-page-header-compact>
    <section class="page-body">
      <div class="change-shell">
        <h1>Cambiar membresia</h1>

        <div class="options-list" role="list" aria-label="Opciones de membresia">
          @for (option of options; track option.id) {
            <button
              type="button"
              class="option-card"
              [class.option-card-selected]="selectedOptionId === option.id"
              (click)="selectOption(option.id)"
            >
              <span class="option-radio" [class.option-radio-selected]="selectedOptionId === option.id" aria-hidden="true"></span>
              <span class="option-copy">
                <strong>{{ option.name }}</strong>
                <small>{{ option.note }}</small>
              </span>
              <span class="option-price">{{ option.price }}</span>
            </button>
          }
        </div>

        <a class="confirm-link" routerLink="/mi-membresia">Confirmar cambio</a>
      </div>
    </section>
  </main>
</app-page-bg>
