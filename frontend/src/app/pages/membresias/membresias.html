<app-page-bg>
<div class="members-page">
  <section class="members-shell">
    <app-page-header [showBack]="true" backHref="/"></app-page-header>

    <div class="members-grid">
      <article class="members-copy">
        <h1>Membresias</h1>

        <div class="plan-row">
          <span>Mensual - Pase libre</span>
          <strong>$55.000</strong>
        </div>

        <div class="plan-row">
          <span>Mensual - 3 veces por semana</span>
          <strong>$50.000</strong>
        </div>

        <div class="plan-row">
          <span>Mensual - 2 veces por semana</span>
          <strong>$40.000</strong>
        </div>

        <p>Seleccioná el que mejor se adapte a vos!</p>

        <section class="hours-card" aria-label="Horarios del gimnasio">
          <h2>Horarios</h2>

          <div class="hours-block">
            <h3>Lunes a viernes</h3>

            <div class="slot">
              <span>Mañana</span>
              <strong>6:30 - 10:00</strong>
            </div>

            <div class="slot">
              <span>Siesta</span>
              <strong>13:30 - 16:00</strong>
            </div>

            <div class="slot">
              <span>Tarde / noche</span>
              <strong>18:00 - 22:30</strong>
            </div>
          </div>

          <div class="hours-divider" aria-hidden="true"></div>

          <div class="hours-block hours-block--compact">
            <h3>Sabado</h3>
            <strong>9:00 - 11:00</strong>
          </div>
        </section>
      </article>

      <aside class="image-card" aria-label="Entrenamiento funcional">
        <img
          src="/images/mujer-entrenando.png"
          alt="Mujer entrenando en el gimnasio"
          loading="lazy"
        />
      </aside>
    </div>
  </section>
</div>
</app-page-bg>
