<app-page-bg>
  <main class="page-with-compact-header">
    <app-page-header-compact backHref="/?fromMenu=1"></app-page-header-compact>
    <section class="page-body">
      <nav class="client-menu" aria-label="Menu del cliente">
        <h1>Bienvenido/a!</h1>

        <a class="menu-card" routerLink="/mi-plan">
          <span class="icon-badge" aria-hidden="true">
            <i class="fi fi-rr-list-check"></i>
          </span>
          <span class="menu-label">Mi plan</span>
        </a>

        <a class="menu-card" routerLink="/mis-pagos">
          <span class="icon-badge" aria-hidden="true">
            <i class="fi fi-rr-credit-card"></i>
          </span>
          <span class="menu-label">Mis pagos</span>
        </a>

        <a class="menu-card menu-card-wide" routerLink="/mi-membresia">
          <span class="icon-badge" aria-hidden="true">
            <i class="fi fi-rr-calendar-lines"></i>
          </span>
          <span class="menu-label">Mi membresia</span>
        </a>

        <a class="menu-card menu-card-wide" href="/seguimiento-cliente" (click)="onSeguimientoClick($event)">
          <span class="icon-badge" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <path d="M4 19V5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <path d="M4 19H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              <rect x="7" y="12" width="2.6" height="5" rx="0.8" fill="currentColor" />
              <rect x="11" y="9" width="2.6" height="8" rx="0.8" fill="currentColor" />
              <rect x="15" y="6" width="2.6" height="11" rx="0.8" fill="currentColor" />
              <path d="M7.5 10.5L12.2 7.3L16.6 4.8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </span>
          <span class="menu-label">Seguimiento personalizado</span>
        </a>
      </nav>
    </section>
  </main>
</app-page-bg>
