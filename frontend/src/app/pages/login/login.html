<app-page-bg>
  <main class="page-with-compact-header">
    <app-page-header-compact backHref="/"></app-page-header-compact>
    <section class="page-body">
      <div class="login-shell">
        <h1>Inicia sesion</h1>

        <form class="login-form" novalidate>
          <label class="sr-only" for="email">Correo electronico</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="correo electronico"
            autocomplete="email"
          />

          <label class="sr-only" for="password">Contrasena</label>
          <input
            id="password"
            type="password"
            name="password"
            placeholder="contraseña"
            autocomplete="current-password"
          />

          <button type="button" class="primary-action" routerLink="/menu-cliente">Iniciar sesion</button>
          <a class="secondary-link" routerLink="/register">Todavia no tengo cuenta</a>
        </form>
      </div>
    </section>
  </main>
</app-page-bg>
