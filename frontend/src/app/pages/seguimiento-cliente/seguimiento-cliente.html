<app-page-bg>
  <main class="page-with-compact-header">
    <app-page-header-compact backHref="/menu-cliente"></app-page-header-compact>
    <section class="page-body">
      <div class="detail-shell">
        <h1>Seguimiento personalizado</h1>

        @if (isLoading) {
          <p class="status-note">Cargando tests...</p>
        }

        @if (!isLoading && statusMessage) {
          <p class="status-note">{{ statusMessage }}</p>
        }

        <div class="metrics-grid">
          @for (metric of metrics; track metric.key) {
            <article class="metric-card">
              <header class="metric-head">
                <h2>{{ metric.title }}</h2>
              </header>

              <div class="chart-box" aria-label="Grafico mensual de progreso">
                <svg class="line-chart" viewBox="0 0 100 60" role="img" aria-label="Grafico lineal mensual">
                  @for (row of gridRows; track row) {
                    <line class="grid-line" x1="0" [attr.y1]="row" x2="100" [attr.y2]="row"></line>
                  }

                  @for (column of getGridColumns(metric.values.length); track column) {
                    <line class="grid-line grid-line-vertical" [attr.x1]="column" y1="0" [attr.x2]="column" y2="60"></line>
                  }

                  <polyline class="trend-line" [attr.points]="getTrendPath(metric.values)"></polyline>

                  @for (dot of getTrendDots(metric.values); track dot.key) {
                    <circle class="trend-dot" [attr.cx]="dot.x" [attr.cy]="dot.y" r="1.35"></circle>
                    <text class="dot-label" [attr.x]="dot.x" [attr.y]="dot.y - 2.5" text-anchor="middle">
                      {{ formatValue(dot.value) }}@if (metric.unit) { {{ metric.unit }} }
                    </text>
                    <text class="month-label" [attr.x]="dot.x" [attr.y]="dot.y + 4.2" text-anchor="middle">
                      {{ dot.month }}
                    </text>
                  }
                </svg>
              </div>
            </article>
          }
        </div>
      </div>
    </section>
  </main>
</app-page-bg>
