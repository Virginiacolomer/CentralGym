<app-page-bg>
  <main class="page-with-compact-header">
    <app-page-header-compact backHref="/menu-admin"></app-page-header-compact>
    <section class="page-body">
      <div class="memberships-shell">
        <h1>Gestion de membresias</h1>

        <div class="memberships-panel">
          <table aria-label="Tabla de gestion de membresias">
            <thead>
              <tr>
                <th>Membresia</th>
                <th>Costo</th>
                <th class="actions-head"></th>
              </tr>
            </thead>
            <tbody>
              @for (membership of memberships; track membership.id) {
                <tr>
                  <td>{{ membership.name }}</td>
                  <td>
                    <div class="cost-cell">
                      @if (membership.isEditing) {
                        <input
                          class="cost-input"
                          type="text"
                          inputmode="numeric"
                          [(ngModel)]="membership.draftAmount"
                          aria-label="Editar costo de membresia"
                        />
                      } @else {
                        <span class="cost-value">{{ formatAmount(membership.amount) }}</span>
                      }

                      <button
                        type="button"
                        class="icon-button"
                        aria-label="Editar costo"
                        title="Editar costo"
                        (click)="startEditing(membership.id)"
                      >
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                          <path
                            d="M4 20L8.2 18.8L18.3 8.7C19.2 7.8 19.2 6.3 18.3 5.4L17.6 4.7C16.7 3.8 15.2 3.8 14.3 4.7L4.2 14.8L3 19L4 20Z"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          />
                          <path
                            d="M13.5 5.5L17.5 9.5"
                            stroke="currentColor"
                            stroke-width="1.8"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          />
                        </svg>
                      </button>
                    </div>
                  </td>
                  <td class="action-cell">
                    <button
                      type="button"
                      class="save-button"
                      (click)="saveMembership(membership.id)"
                    >
                      Guardar
                      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path
                          d="M6 3H18L20 5V21L12 17L4 21V5L6 3Z"
                          stroke="currentColor"
                          stroke-width="1.7"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </svg>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</app-page-bg>
